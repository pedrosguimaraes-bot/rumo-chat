<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RUMO · Guia Inteligente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --preto: #313131;
  --branco: #ffffff;
  --creme: #eee8de;
  --verde: #4a9e6b;
  --verde-escuro: #3a8558;
  --real: #e1b84a;
  --dume: #907a96;
  --semelhe: #e75b5b;
  --lbl: 0.6rem;
  --header-h: 64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--branco);color:var(--preto);display:flex;flex-direction:column}
header{
  height:var(--header-h);border-bottom:3px solid var(--preto);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;background:var(--branco);flex-shrink:0;position:relative;z-index:10;
}
.nav-logo img{height:36px;display:block}
.nav-links{display:flex;gap:0.5rem}
.nav-links a{
  font-family:'Josefin Sans',sans-serif;
  font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;
  text-decoration:none;color:var(--preto);padding:0.5rem 0.9rem;
  border:1.5px solid transparent;transition:border-color 0.2s;
}
.nav-links a:hover{border-color:var(--preto)}
.chat-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--branco)}
.chat-status{
  display:flex;align-items:center;gap:0.6rem;padding:0.75rem 2rem;
  border-bottom:1px solid #e0dbd2;
  font-family:'Josefin Sans',sans-serif;font-size:var(--lbl);letter-spacing:0.15em;text-transform:uppercase;
  color:var(--preto);flex-shrink:0;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;background:var(--verde);
  box-shadow:0 0 0 3px rgba(74,158,107,0.25);animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(74,158,107,0.25)}50%{box-shadow:0 0 0 6px rgba(74,158,107,0.1)}}
.chat-msgs{
  flex:1;overflow-y:auto;padding:2rem;
  display:flex;flex-direction:column;gap:1.25rem;scroll-behavior:smooth;
}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:#d0c8bb;border-radius:2px}
.msg{display:flex;flex-direction:column;max-width:62%;gap:0.3rem;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.agent{align-self:flex-start}
.msg.user{align-self:flex-end}
.msg-label{
  font-family:'Josefin Sans',sans-serif;font-size:var(--lbl);
  letter-spacing:0.15em;text-transform:uppercase;color:#999;padding:0 0.25rem;
}
.msg.user .msg-label{text-align:right}
.msg-bubble{padding:1rem 1.25rem;font-size:0.9rem;line-height:1.65;border-radius:2px}
.msg.agent .msg-bubble{background:#f5f2ec;border-left:3px solid var(--verde);color:var(--preto)}
.msg.user .msg-bubble{background:var(--verde);color:var(--branco);font-weight:500}
.typing-bubble{
  padding:1rem 1.25rem;background:#f5f2ec;
  border-left:3px solid var(--verde);border-radius:2px;
  display:flex;gap:5px;align-items:center;
}
.typing-bubble span{
  width:6px;height:6px;border-radius:50%;background:var(--verde);opacity:0.6;
  animation:bounce 1.2s infinite;
}
.typing-bubble span:nth-child(2){animation-delay:0.2s}
.typing-bubble span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.suggestions{padding:0 2rem 1rem;display:flex;flex-wrap:wrap;gap:0.5rem;flex-shrink:0}
.sugg{
  font-family:'Josefin Sans',sans-serif;font-size:0.65rem;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  background:transparent;border:1.5px solid var(--verde);color:var(--verde);
  padding:0.45rem 0.85rem;cursor:pointer;border-radius:2px;
  transition:all 0.2s;white-space:nowrap;
}
.sugg:hover{background:var(--verde);color:var(--branco)}
.chat-input-wrap{
  padding:1rem 2rem 1.5rem;border-top:2px solid var(--preto);
  display:flex;gap:0.75rem;align-items:flex-end;flex-shrink:0;background:var(--branco);
}
#chat-input{
  flex:1;font-family:'DM Sans',sans-serif;font-size:0.9rem;
  border:none;border-bottom:2px solid var(--preto);padding:0.5rem 0;
  background:transparent;color:var(--preto);resize:none;outline:none;
  line-height:1.5;min-height:2rem;max-height:6rem;
}
#chat-input::placeholder{color:#bbb}
#send-btn{
  background:var(--verde);border:none;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border-radius:2px;flex-shrink:0;transition:background 0.2s;
}
#send-btn:hover{background:var(--verde-escuro)}
#send-btn svg{width:18px;height:18px;fill:white}
@media(max-width:768px){
  header{padding:0 1rem}
  .nav-links{display:none}
  .chat-msgs{padding:1rem}
  .msg{max-width:85%}
  .chat-input-wrap{padding:0.75rem 1rem 1rem}
  .suggestions{padding:0 1rem 0.75rem}
}
</style>
</head>

</header>
<div class="chat-wrap">
  <div class="chat-status">
    <div class="status-dot"></div>
    <span>Rumo · Guia Disponível</span>
  </div>
  <div class="chat-msgs" id="chat-msgs">
    <div class="msg agent">
      <div class="msg-label">Rumo</div>
      <div class="msg-bubble">
        Bem-vindo. Sou o guia RUMO das freguesias de Real, Dume e Semelhe, em Braga.<br><br>
        Pode perguntar-me sobre percursos, pontos de interesse, história ou natureza. Em que posso ajudar?
      </div>
    </div>
  </div>
  <div class="suggestions" id="suggestions">
    <button class="sugg" onclick="sendSugg(this)">Percurso para família com crianças</button>
    <button class="sugg" onclick="sendSugg(this)">Pontos arqueológicos em Dume</button>
    <button class="sugg" onclick="sendSugg(this)">O que é a Capela de São Frutuoso?</button>
    <button class="sugg" onclick="sendSugg(this)">Os dois percursos no mesmo dia?</button>
    <button class="sugg" onclick="sendSugg(this)">O que torna Semelhe especial?</button>
  </div>
  <div class="chat-input-wrap">
    <textarea id="chat-input" placeholder="Escreva a sua pergunta..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMsg()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>
<script>
const history=[];
function addMsg(role,html){
  const box=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className='msg '+(role==='assistant'?'agent':'user');
  d.innerHTML='<div class="msg-label">'+(role==='assistant'?'Rumo':'Você')+'</div><div class="msg-bubble">'+html+'</div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function showTyping(){
  const box=document.getElementById('chat-msgs');
  const d=document.createElement('div');
  d.className='msg agent';d.id='typing';
  d.innerHTML='<div class="msg-label">Rumo</div><div class="typing-bubble"><span></span><span></span><span></span></div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function hideTyping(){const el=document.getElementById('typing');if(el)el.remove();}
function sendSugg(btn){
  document.getElementById('chat-input').value=btn.textContent;
  document.getElementById('suggestions').style.display='none';
  sendMsg();
}
async function sendMsg(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();if(!text)return;
  inp.value='';inp.style.height='auto';
  addMsg('user',text);
  history.push({role:'user',content:text});
  showTyping();
  try{
    const res=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:history})
    });
    const data=await res.json();
    hideTyping();
    const reply=(data.content||[]).map(b=>b.text||'').join('')||'Não foi possível responder. Tente novamente.';
    addMsg('assistant',reply.replace(/\n/g,'<br>'));
    history.push({role:'assistant',content:reply});
  }catch(e){
    hideTyping();
    addMsg('assistant','Erro de ligação. Por favor tente novamente.');
    history.pop();
  }
}
document.getElementById('chat-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});
document.getElementById('chat-input').addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,96)+'px';
});
</script>
</body>
</html>
